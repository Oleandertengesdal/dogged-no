<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogged 2048</title>
  <style>
    :root {
      --bg: #faf8ef;
      --panel: #f3efe6;
      --board: #bbada0;
      --cell: rgba(238, 228, 218, 0.35);
      --text: #776e65;
      --text-light: #f9f6f2;
      --accent: #8f7a66;
      --btn: #8f7a66;
      --btn-hover: #7b6858;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      --tile-2: #eee4da;
      --tile-4: #ede0c8;
      --tile-8: #f2b179;
      --tile-16: #f59563;
      --tile-32: #f67c5f;
      --tile-64: #f65e3b;
      --tile-128: #edcf72;
      --tile-256: #edcc61;
      --tile-512: #edc850;
      --tile-1024: #edc53f;
      --tile-2048: #edc22e;
      --tile-super: #3c3a32;
      --board-size: min(92vw, 460px);
      --gap: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #fffefb 0%, var(--bg) 45%, #f5f1e7 100%);
      display: grid;
      place-items: center;
      padding: 24px 12px;
      overflow-x: hidden;
    }

    .game-shell {
      width: 100%;
      max-width: 980px;
      display: grid;
      gap: 22px;
      grid-template-columns: 1fr;
      justify-items: center;
    }

    .game-panel {
      width: 100%;
      max-width: 540px;
      background: var(--panel);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.1rem);
      line-height: 1;
      letter-spacing: -0.03em;
      color: #5f554b;
    }

    .score-wrap {
      display: flex;
      gap: 8px;
    }

    .score-box {
      background: #b8aa9d;
      border-radius: 10px;
      color: var(--text-light);
      min-width: 96px;
      text-align: center;
      padding: 7px 10px;
    }

    .score-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      opacity: 0.9;
    }

    .score-value {
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .sub-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .hint {
      margin: 0;
      font-size: 0.95rem;
      color: #7f7468;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--btn);
      color: var(--text-light);
      font-size: 0.94rem;
      font-weight: 700;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    button:hover { background: var(--btn-hover); }
    button:active { transform: translateY(1px); }

    .board-wrap {
      position: relative;
      width: var(--board-size);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
    }

    .grid,
    .tile-layer {
      position: absolute;
      inset: 0;
    }

    .grid {
      background: var(--board);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      padding: var(--gap);
      border-radius: 12px;
    }

    .cell {
      background: var(--cell);
      border-radius: 8px;
    }

    .tile-layer {
      pointer-events: none;
      padding: var(--gap);
      z-index: 2;
    }

    .tile {
      position: absolute;
      width: calc((100% - (5 * var(--gap))) / 4);
      height: calc((100% - (5 * var(--gap))) / 4);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #776e65;
      font-size: clamp(1.4rem, 5vw, 2rem);
      transition: transform 145ms ease-in-out, opacity 120ms ease-in-out;
      transform: translate(0, 0);
      will-change: transform;
      font-variant-numeric: tabular-nums;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    .tile.t2 { background: var(--tile-2); }
    .tile.t4 { background: var(--tile-4); }
    .tile.t8 { background: var(--tile-8); color: var(--text-light); }
    .tile.t16 { background: var(--tile-16); color: var(--text-light); }
    .tile.t32 { background: var(--tile-32); color: var(--text-light); }
    .tile.t64 { background: var(--tile-64); color: var(--text-light); }
    .tile.t128 { background: var(--tile-128); color: var(--text-light); font-size: clamp(1.2rem, 4.3vw, 1.75rem); }
    .tile.t256 { background: var(--tile-256); color: var(--text-light); font-size: clamp(1.2rem, 4.3vw, 1.75rem); }
    .tile.t512 { background: var(--tile-512); color: var(--text-light); font-size: clamp(1.2rem, 4.3vw, 1.75rem); }
    .tile.t1024 { background: var(--tile-1024); color: var(--text-light); font-size: clamp(1rem, 3.7vw, 1.45rem); }
    .tile.t2048 { background: var(--tile-2048); color: var(--text-light); font-size: clamp(1rem, 3.7vw, 1.45rem); }
    .tile.super { background: var(--tile-super); color: var(--text-light); font-size: clamp(1rem, 3.7vw, 1.35rem); }

    .tile.new {
      animation: tileAppear 180ms ease;
    }

    .tile.merged {
      animation: tileMerge 220ms ease;
      z-index: 3;
    }

    .tile.removing {
      opacity: 0;
    }

    @keyframes tileAppear {
      0% { scale: 0.4; opacity: 0.35; }
      100% { scale: 1; opacity: 1; }
    }

    @keyframes tileMerge {
      0% { scale: 1; }
      45% { scale: 1.14; }
      100% { scale: 1; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.76);
      display: grid;
      place-items: center;
      text-align: center;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      border-radius: 12px;
      padding: 12px;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(143, 122, 102, 0.24);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
      padding: 18px 16px;
      width: min(92%, 340px);
    }

    .overlay h2 {
      margin: 0 0 8px;
      color: #5f554b;
      font-size: 1.8rem;
    }

    .overlay p {
      margin: 0 0 12px;
      color: #75695d;
    }

    .overlay-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .leaderboard {
      width: 100%;
      max-width: 540px;
      background: #fffdf8;
      border: 1px solid rgba(143, 122, 102, 0.2);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      padding: 14px;
    }

    .leaderboard h3 {
      margin: 0 0 10px;
      color: #5f554b;
      font-size: 1.12rem;
    }

    .leaderboard-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
    }

    .leaderboard-item {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 9px;
      background: #f6f1e7;
      font-size: 0.95rem;
    }

    .leaderboard-rank {
      font-weight: 800;
      color: #8f7a66;
      text-align: center;
    }

    .leaderboard-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
      color: #6b5f53;
    }

    .leaderboard-score {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      color: #5f554b;
    }

    .leaderboard-empty {
      margin: 0;
      color: #8a7d6f;
      font-size: 0.92rem;
    }

    @media (max-width: 540px) {
      .game-panel { padding: 14px; }
      .score-box { min-width: 86px; }
      .hint { font-size: 0.88rem; }
      button { padding: 8px 11px; }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="game-panel">
      <div class="top-row">
        <h1>2048</h1>
        <div class="score-wrap">
          <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
          </div>
          <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="bestValue">0</div>
          </div>
        </div>
      </div>

      <div class="sub-row">
        <p class="hint">Use Arrow Keys or WASD. Merge tiles to reach 2048.</p>
        <div class="actions">
          <button id="restartBtn" type="button">Restart</button>
        </div>
      </div>

      <div class="board-wrap" id="boardWrap">
        <div class="grid" aria-hidden="true">
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <div class="tile-layer" id="tileLayer" aria-label="2048 board"></div>

        <div class="overlay" id="winOverlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
          <div class="overlay-card">
            <h2 id="winTitle">You Win!</h2>
            <p>You reached 2048. Keep going for a bigger score.</p>
            <div class="overlay-actions">
              <button id="continueBtn" type="button">Continue</button>
              <button id="winRestartBtn" type="button">Restart</button>
            </div>
          </div>
        </div>

        <div class="overlay" id="gameOverOverlay" role="dialog" aria-modal="true" aria-labelledby="loseTitle">
          <div class="overlay-card">
            <h2 id="loseTitle">Game Over</h2>
            <p>No moves left. Try another run.</p>
            <div class="overlay-actions">
              <button id="loseRestartBtn" type="button">Play Again</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="leaderboard" aria-live="polite">
      <h3>Top 5 - 2048</h3>
      <ol class="leaderboard-list" id="leaderboardList"></ol>
      <p class="leaderboard-empty" id="leaderboardEmpty">No scores yet. Be the first.</p>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      // =============================
      // Shared leaderboard helpers
      // =============================
      // Fallback implementation that follows the requested shape and spirit.
      // If another page already defines saveScore, this page reuses that version.
      if (typeof window.saveScore !== 'function') {
        window.saveScore = function saveScore(gameName, score) {
          const key = 'dogged-local-leaderboards';
          const raw = localStorage.getItem(key);
          let db = {};
          try { db = raw ? JSON.parse(raw) : {}; } catch { db = {}; }

          if (!db[gameName]) db[gameName] = [];

          let username = (localStorage.getItem('dogged-player-name') || '').trim();
          if (!username) {
            username = (window.prompt('Enter your username for leaderboard:', '') || '').trim();
            if (!username) username = 'Anonymous';
            username = username.slice(0, 20).replace(/[<>]/g, '');
            localStorage.setItem('dogged-player-name', username);
          }

          db[gameName].push({
            name: username,
            score: Number(score) || 0,
            ts: Date.now(),
          });

          db[gameName].sort((a, b) => b.score - a.score);
          db[gameName] = db[gameName].slice(0, 50);
          localStorage.setItem(key, JSON.stringify(db));
          return db[gameName];
        };
      }

      function getTopScores(gameName, limit = 5) {
        const key = 'dogged-local-leaderboards';
        const raw = localStorage.getItem(key);
        let db = {};
        try { db = raw ? JSON.parse(raw) : {}; } catch { db = {}; }
        const list = Array.isArray(db[gameName]) ? db[gameName] : [];
        return list.slice(0, limit);
      }

      // =============================
      // DOM references
      // =============================
      const tileLayer = document.getElementById('tileLayer');
      const scoreValue = document.getElementById('scoreValue');
      const bestValue = document.getElementById('bestValue');
      const restartBtn = document.getElementById('restartBtn');
      const winOverlay = document.getElementById('winOverlay');
      const gameOverOverlay = document.getElementById('gameOverOverlay');
      const continueBtn = document.getElementById('continueBtn');
      const winRestartBtn = document.getElementById('winRestartBtn');
      const loseRestartBtn = document.getElementById('loseRestartBtn');
      const leaderboardList = document.getElementById('leaderboardList');
      const leaderboardEmpty = document.getElementById('leaderboardEmpty');

      // =============================
      // Game state
      // =============================
      const SIZE = 4;
      const MOVE_MS = 150;

      let grid = makeEmptyGrid();
      let tiles = new Map();
      let nextTileId = 1;

      let score = 0;
      let best = Number(localStorage.getItem('dogged-2048-best') || 0);
      let hasWon = false;
      let inputLocked = false;
      let lastSavedScore = -1;

      let tileElements = new Map();

      function makeEmptyGrid() {
        return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      }

      function updateScoreUI() {
        scoreValue.textContent = String(score);
        bestValue.textContent = String(best);
      }

      function createTile(row, col, value, isNew = false) {
        const tile = {
          id: nextTileId++,
          row,
          col,
          value,
          isNew,
          isMerged: false,
          isRemoving: false,
        };
        tiles.set(tile.id, tile);
        grid[row][col] = tile.id;
      }

      function randomEmptyCell() {
        const empties = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) empties.push({ row: r, col: c });
          }
        }
        if (!empties.length) return null;
        return empties[Math.floor(Math.random() * empties.length)];
      }

      function spawnRandomTile(isNew = true) {
        const pos = randomEmptyCell();
        if (!pos) return false;
        const value = Math.random() < 0.9 ? 2 : 4;
        createTile(pos.row, pos.col, value, isNew);
        return true;
      }

      function clearBoard() {
        grid = makeEmptyGrid();
        tiles.clear();
        tileElements.clear();
        tileLayer.innerHTML = '';
      }

      function resetGame() {
        clearBoard();
        score = 0;
        hasWon = false;
        inputLocked = false;
        lastSavedScore = -1;
        hideOverlays();

        spawnRandomTile(true);
        spawnRandomTile(true);

        updateScoreUI();
        renderTiles();
        renderLeaderboard();
      }

      function hideOverlays() {
        winOverlay.classList.remove('show');
        gameOverOverlay.classList.remove('show');
      }

      function cellTranslate(row, col) {
        const tileSizeExpr = '(100% - (5 * var(--gap))) / 4';
        const x = `calc(${col} * (${tileSizeExpr} + var(--gap)))`;
        const y = `calc(${row} * (${tileSizeExpr} + var(--gap)))`;
        return { x, y };
      }

      // =============================
      // Rendering
      // =============================
      function tileClassForValue(value) {
        if (value <= 2048) return 't' + value;
        return 'super';
      }

      function renderTiles() {
        const activeIds = new Set();

        tiles.forEach((tile) => {
          activeIds.add(tile.id);

          let el = tileElements.get(tile.id);
          if (!el) {
            el = document.createElement('div');
            el.className = 'tile';
            el.dataset.id = String(tile.id);
            tileElements.set(tile.id, el);
            tileLayer.appendChild(el);
          }

          el.textContent = String(tile.value);
          el.className = 'tile ' + tileClassForValue(tile.value);

          if (tile.isNew) el.classList.add('new');
          if (tile.isMerged) el.classList.add('merged');
          if (tile.isRemoving) el.classList.add('removing');

          const { x, y } = cellTranslate(tile.row, tile.col);
          el.style.transform = `translate(${x}, ${y})`;
        });

        [...tileElements.keys()].forEach((id) => {
          if (!activeIds.has(id)) {
            const staleEl = tileElements.get(id);
            if (staleEl && staleEl.parentNode) staleEl.parentNode.removeChild(staleEl);
            tileElements.delete(id);
          }
        });

        updateScoreUI();
      }

      // =============================
      // Movement logic
      // =============================
      function getLines(direction) {
        const lines = [];

        if (direction === 'left') {
          for (let r = 0; r < SIZE; r++) {
            lines.push([{ row: r, col: 0 }, { row: r, col: 1 }, { row: r, col: 2 }, { row: r, col: 3 }]);
          }
        }

        if (direction === 'right') {
          for (let r = 0; r < SIZE; r++) {
            lines.push([{ row: r, col: 3 }, { row: r, col: 2 }, { row: r, col: 1 }, { row: r, col: 0 }]);
          }
        }

        if (direction === 'up') {
          for (let c = 0; c < SIZE; c++) {
            lines.push([{ row: 0, col: c }, { row: 1, col: c }, { row: 2, col: c }, { row: 3, col: c }]);
          }
        }

        if (direction === 'down') {
          for (let c = 0; c < SIZE; c++) {
            lines.push([{ row: 3, col: c }, { row: 2, col: c }, { row: 1, col: c }, { row: 0, col: c }]);
          }
        }

        return lines;
      }

      function performMove(direction) {
        if (inputLocked) return;

        const lines = getLines(direction);
        const actions = [];
        const survivors = [];
        const mergedInto = new Set();
        const removeAfter = new Set();

        let moved = false;

        for (const line of lines) {
          const slots = [];

          for (const coord of line) {
            const id = grid[coord.row][coord.col];
            if (id === null) continue;

            const tile = tiles.get(id);
            const last = slots[slots.length - 1];

            if (last && !last.merged && tiles.get(last.id).value === tile.value) {
              actions.push({ id, to: { row: last.to.row, col: last.to.col }, mergeInto: last.id });
              last.merged = true;
              mergedInto.add(last.id);
              removeAfter.add(id);
              continue;
            }

            const target = line[slots.length];
            slots.push({ id, to: { row: target.row, col: target.col }, merged: false });
            actions.push({ id, to: { row: target.row, col: target.col }, mergeInto: null });
          }

          survivors.push(...slots.map((slot) => slot.id));
        }

        // Determine if at least one tile moved or merged.
        for (const action of actions) {
          const tile = tiles.get(action.id);
          if (!tile) continue;
          if (tile.row !== action.to.row || tile.col !== action.to.col || action.mergeInto) {
            moved = true;
            break;
          }
        }

        if (!moved) return;

        inputLocked = true;

        // Reset per-move flags.
        tiles.forEach((t) => {
          t.isNew = false;
          t.isMerged = false;
          t.isRemoving = false;
        });

        // Build next grid with survivor positions.
        const nextGrid = makeEmptyGrid();
        for (const id of survivors) {
          const action = actions.find((a) => a.id === id);
          const tile = tiles.get(id);
          tile.row = action.to.row;
          tile.col = action.to.col;
          nextGrid[tile.row][tile.col] = id;
        }

        // Move merged-away tiles to their target so they slide before removal.
        for (const action of actions) {
          if (!action.mergeInto) continue;
          const tile = tiles.get(action.id);
          if (!tile) continue;
          tile.row = action.to.row;
          tile.col = action.to.col;
          tile.isRemoving = true;
        }

        // Apply merges and score on survivor tiles.
        mergedInto.forEach((id) => {
          const tile = tiles.get(id);
          if (!tile) return;
          tile.value *= 2;
          tile.isMerged = true;
          score += tile.value;
          if (tile.value >= 2048) hasWon = true;
        });

        if (score > best) {
          best = score;
          localStorage.setItem('dogged-2048-best', String(best));
        }

        grid = nextGrid;

        renderTiles();
        playBeep(580, 0.05);

        setTimeout(() => {
          // Remove merged-away tiles after slide animation.
          removeAfter.forEach((id) => {
            tiles.delete(id);
          });

          // Clear one-shot merged animation flag.
          mergedInto.forEach((id) => {
            const tile = tiles.get(id);
            if (tile) tile.isMerged = false;
          });

          spawnRandomTile(true);
          renderTiles();

          setTimeout(() => {
            tiles.forEach((t) => { t.isNew = false; });
            renderTiles();

            if (hasWon && !winOverlay.classList.contains('show')) {
              winOverlay.classList.add('show');
              saveScoreForRoundEnd();
              playBeep(740, 0.08);
            } else if (!canMove()) {
              gameOverOverlay.classList.add('show');
              saveScoreForRoundEnd();
              playBeep(180, 0.12);
            }

            inputLocked = false;
          }, 110);
        }, MOVE_MS);
      }

      function canMove() {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const id = grid[r][c];
            if (id === null) return true;

            const current = tiles.get(id);
            const right = c + 1 < SIZE ? tiles.get(grid[r][c + 1]) : null;
            const down = r + 1 < SIZE ? tiles.get(grid[r + 1][c]) : null;

            if (right && right.value === current.value) return true;
            if (down && down.value === current.value) return true;
          }
        }
        return false;
      }

      // =============================
      // Input handling
      // =============================
      function keyToDirection(key) {
        switch (key) {
          case 'ArrowLeft':
          case 'a':
          case 'A':
            return 'left';
          case 'ArrowRight':
          case 'd':
          case 'D':
            return 'right';
          case 'ArrowUp':
          case 'w':
          case 'W':
            return 'up';
          case 'ArrowDown':
          case 's':
          case 'S':
            return 'down';
          default:
            return null;
        }
      }

      document.addEventListener('keydown', (e) => {
        const direction = keyToDirection(e.key);
        if (!direction) return;

        // Prevent page scrolling while controlling the game.
        e.preventDefault();

        if (winOverlay.classList.contains('show') || gameOverOverlay.classList.contains('show')) {
          return;
        }

        performMove(direction);
      }, { passive: false });

      // Mobile swipe support.
      let touchStartX = 0;
      let touchStartY = 0;

      document.getElementById('boardWrap').addEventListener('touchstart', (e) => {
        if (!e.touches || !e.touches.length) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      document.getElementById('boardWrap').addEventListener('touchend', (e) => {
        if (!e.changedTouches || !e.changedTouches.length) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        const threshold = 28;
        if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

        if (winOverlay.classList.contains('show') || gameOverOverlay.classList.contains('show')) {
          return;
        }

        if (Math.abs(dx) > Math.abs(dy)) {
          performMove(dx > 0 ? 'right' : 'left');
        } else {
          performMove(dy > 0 ? 'down' : 'up');
        }
      }, { passive: true });

      // =============================
      // Leaderboard rendering
      // =============================
      function renderLeaderboard() {
        const entries = getTopScores('2048', 5);
        leaderboardList.innerHTML = '';

        if (!entries.length) {
          leaderboardEmpty.style.display = 'block';
          return;
        }

        leaderboardEmpty.style.display = 'none';

        entries.forEach((entry, index) => {
          const li = document.createElement('li');
          li.className = 'leaderboard-item';
          li.innerHTML =
            `<span class="leaderboard-rank">${index + 1}</span>` +
            `<span class="leaderboard-name">${escapeHtml(entry.name || 'Anonymous')}</span>` +
            `<span class="leaderboard-score">${Number(entry.score || 0)}</span>`;
          leaderboardList.appendChild(li);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function saveScoreForRoundEnd() {
        if (score <= lastSavedScore) return;
        lastSavedScore = score;
        window.saveScore('2048', score);
        renderLeaderboard();
      }

      // =============================
      // Optional simple sound effect
      // =============================
      let audioCtx = null;
      function playBeep(freq, duration) {
        try {
          if (!audioCtx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            audioCtx = new Ctx();
          }

          const now = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = 'triangle';
          osc.frequency.value = freq;
          gain.gain.value = 0.0001;
          gain.gain.exponentialRampToValueAtTime(0.03, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + duration);
        } catch {
          // Silent fallback if browser blocks audio.
        }
      }

      // =============================
      // Controls
      // =============================
      restartBtn.addEventListener('click', resetGame);
      winRestartBtn.addEventListener('click', resetGame);
      loseRestartBtn.addEventListener('click', resetGame);
      continueBtn.addEventListener('click', () => {
        winOverlay.classList.remove('show');
      });

      // =============================
      // Boot
      // =============================
      bestValue.textContent = String(best);
      resetGame();
    })();
  </script>
</body>
</html>

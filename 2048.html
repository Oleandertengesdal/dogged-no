<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogged 2048</title>
  <style>
    :root {
      --bg: #070d18;
      --panel: #111b2f;
      --panel-border: rgba(100, 168, 255, 0.24);
      --text: #e7efff;
      --muted: #9db0da;
      --cyan: #66d5ff;
      --green: #71f7ba;
      --orange: #ff9f47;
      --btn: #2f528d;
      --btn-hover: #3e67a9;
      --board: #1b2a47;
      --cell: rgba(128, 168, 234, 0.14);

      --tile-2: #dff6ff;
      --tile-4: #bee9ff;
      --tile-8: #86d6ff;
      --tile-16: #52beff;
      --tile-32: #2e9bf0;
      --tile-64: #1f7ad8;
      --tile-128: #60f1cd;
      --tile-256: #34e2b9;
      --tile-512: #22cfa8;
      --tile-1024: #ffbf63;
      --tile-2048: #ff9f47;
      --tile-super: #ff6f7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 17% 10%, rgba(102, 213, 255, 0.16), transparent 34%),
        radial-gradient(circle at 84% 0%, rgba(113, 247, 186, 0.12), transparent 30%),
        linear-gradient(180deg, #081122 0%, #050913 100%);
      padding: 24px 12px;
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(980px, 100%);
      display: grid;
      gap: 18px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(16, 28, 51, 0.96), rgba(10, 18, 35, 0.95));
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(100, 168, 255, 0.2);
      flex-wrap: wrap;
    }

    .title {
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--green);
    }

    .hud-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chip {
      min-width: 98px;
      border-radius: 10px;
      border: 1px solid rgba(113, 247, 186, 0.24);
      background: rgba(25, 43, 70, 0.88);
      text-align: center;
      padding: 6px 10px;
    }

    .chip .k {
      display: block;
      text-transform: uppercase;
      font-size: 0.67rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .chip .v {
      font-weight: 800;
      color: var(--cyan);
      font-variant-numeric: tabular-nums;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      background: var(--btn);
      color: #ecf3ff;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn:hover { background: var(--btn-hover); }

    .board-section {
      padding: 14px;
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.93rem;
      text-align: center;
    }

    .board-wrap {
      position: relative;
      width: min(92vw, 520px);
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      --gap: 10;
      --tile-size: 80;
    }

    .grid,
    .tile-layer {
      position: absolute;
      inset: 0;
    }

    .grid {
      background: var(--board);
      border-radius: 14px;
      padding: calc(var(--gap) * 1px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: calc(var(--gap) * 1px);
    }

    .cell {
      border-radius: 9px;
      background: var(--cell);
      border: 1px solid rgba(165, 198, 255, 0.12);
    }

    .tile-layer {
      z-index: 3;
      pointer-events: none;
    }

    .tile {
      position: absolute;
      width: calc(var(--tile-size) * 1px);
      height: calc(var(--tile-size) * 1px);
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #11345f;
      font-size: clamp(1.15rem, 4vw, 1.95rem);
      transition: transform 155ms ease, opacity 120ms ease;
      transform: translate(0px, 0px);
      will-change: transform;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.48),
        0 7px 18px rgba(0, 0, 0, 0.22);
      font-variant-numeric: tabular-nums;
    }

    .tile.t2 { background: var(--tile-2); }
    .tile.t4 { background: var(--tile-4); }
    .tile.t8 { background: var(--tile-8); }
    .tile.t16 { background: var(--tile-16); color: #07213f; }
    .tile.t32 { background: var(--tile-32); color: #dff1ff; }
    .tile.t64 { background: var(--tile-64); color: #e9f5ff; }
    .tile.t128 { background: var(--tile-128); color: #06271d; font-size: clamp(1rem, 3.5vw, 1.6rem); }
    .tile.t256 { background: var(--tile-256); color: #06271d; font-size: clamp(1rem, 3.5vw, 1.6rem); }
    .tile.t512 { background: var(--tile-512); color: #082e24; font-size: clamp(1rem, 3.5vw, 1.6rem); }
    .tile.t1024 { background: var(--tile-1024); color: #402004; font-size: clamp(0.92rem, 3vw, 1.28rem); }
    .tile.t2048 { background: var(--tile-2048); color: #402004; font-size: clamp(0.92rem, 3vw, 1.28rem); }
    .tile.super { background: var(--tile-super); color: #ffeef1; font-size: clamp(0.92rem, 3vw, 1.2rem); }

    .tile.new { animation: tileAppear 180ms ease; }
    .tile.merged { animation: tileMerge 210ms ease; z-index: 4; }
    .tile.removing { opacity: 0; }

    @keyframes tileAppear {
      0% { scale: 0.42; opacity: 0.35; }
      100% { scale: 1; opacity: 1; }
    }

    @keyframes tileMerge {
      0% { scale: 1; }
      50% { scale: 1.14; }
      100% { scale: 1; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(8, 14, 28, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 8;
      padding: 12px;
      text-align: center;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay-card {
      width: min(350px, 100%);
      border-radius: 14px;
      border: 1px solid rgba(100, 168, 255, 0.33);
      background: rgba(11, 20, 38, 0.96);
      box-shadow: 0 11px 26px rgba(0, 0, 0, 0.4);
      padding: 18px 16px;
    }

    .overlay h2 {
      margin: 0 0 8px;
      color: #d8ecff;
      font-size: 1.75rem;
    }

    .overlay p {
      margin: 0 0 12px;
      color: #abc1ea;
      line-height: 1.42;
    }

    .overlay-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .leaderboard {
      padding: 14px;
    }

    .leaderboard h3 {
      margin: 0 0 10px;
      color: #cbddff;
      font-size: 1.03rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .lb-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
    }

    .lb-item {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 8px;
      align-items: center;
      border-radius: 10px;
      border: 1px solid rgba(100, 168, 255, 0.2);
      background: rgba(14, 25, 47, 0.85);
      padding: 7px 10px;
      font-size: 0.95rem;
    }

    .lb-rank { text-align: center; font-weight: 800; color: #8db0ee; }
    .lb-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #d8e8ff;
      font-weight: 600;
    }
    .lb-score {
      font-weight: 800;
      color: #8cf8c2;
      font-variant-numeric: tabular-nums;
    }

    .lb-empty {
      margin: 0;
      color: #8ea8d8;
      font-size: 0.93rem;
    }

    .submit-wrap {
      margin-top: 12px;
      border-top: 1px solid rgba(100, 168, 255, 0.2);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .name-input {
      width: 100%;
      border: 1px solid rgba(100, 168, 255, 0.35);
      background: rgba(8, 15, 30, 0.9);
      color: #e7efff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.95rem;
      font-family: inherit;
      text-transform: uppercase;
    }

    .submit-status {
      min-height: 1.2em;
      color: #9db0da;
      font-size: 0.85rem;
    }

    @media (max-width: 620px) {
      .chip { min-width: 88px; }
      .title { font-size: 0.95rem; }
      .board-wrap { --gap: 8; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="hud">
        <div class="title">Dogged 2048</div>
        <div class="hud-right">
          <div class="chip">
            <span class="k">Score</span>
            <span class="v" id="scoreValue">0</span>
          </div>
          <div class="chip">
            <span class="k">Best</span>
            <span class="v" id="bestValue">0</span>
          </div>
          <button class="btn" id="restartBtn" type="button">Restart</button>
          <a href="games.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Game Center</a>
        </div>
      </header>

      <div class="board-section">
        <p class="hint">Use Arrow Keys or WASD. Merge dogged tiles to reach 2048.</p>

        <div class="board-wrap" id="boardWrap">
          <div class="grid" aria-hidden="true">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          </div>

          <div class="tile-layer" id="tileLayer" aria-label="2048 board"></div>

          <div class="overlay" id="winOverlay">
            <div class="overlay-card">
              <h2>Dogged Win!</h2>
              <p>You reached 2048. Keep cooking for a bigger score.</p>
              <div class="overlay-actions">
                <button class="btn" id="continueBtn" type="button">Continue</button>
                <button class="btn" id="winRestartBtn" type="button">Restart</button>
              </div>
            </div>
          </div>

          <div class="overlay" id="gameOverOverlay">
            <div class="overlay-card">
              <h2>Game Over</h2>
              <p>No moves left. Try again, dogged style.</p>
              <div class="overlay-actions">
                <button class="btn" id="loseRestartBtn" type="button">Play Again</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel leaderboard">
      <h3>Top 5 Scores - Dogged 2048</h3>
      <ol class="lb-list" id="leaderboardList"></ol>
      <p class="lb-empty" id="leaderboardEmpty">No scores yet. Be the first.</p>

      <div class="submit-wrap">
        <input id="nameInput" class="name-input" type="text" maxlength="12" placeholder="YOUR NAME" autocomplete="off" />
        <button id="submitBtn" class="btn" type="button" disabled>Submit Latest Score</button>
        <p id="submitStatus" class="submit-status"></p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const API_URL = '/api/2048-leaderboard';
      const DEVICE_PID_KEY = 'dogged-2048-pid';

      function makePid() {
        let pid = localStorage.getItem(DEVICE_PID_KEY);
        if (!pid) {
          pid = typeof crypto.randomUUID === 'function'
            ? crypto.randomUUID()
            : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
              });
          localStorage.setItem(DEVICE_PID_KEY, pid);
        }
        return pid;
      }

      const devicePid = makePid();

      function simpleHash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          const c = str.charCodeAt(i);
          h = ((h << 5) - h) + c;
          h |= 0;
        }
        return (h >>> 0).toString(36);
      }

      function secret() {
        return ['D0G', 'G3D', '-S1', 'GV3', '-20', '26'].join('');
      }

      function makeSig(name, score, ts, pid) {
        return simpleHash(`2048|${name}|${score}|${ts}|${pid}|${secret()}`);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      // =========================================================
      // DOM refs
      // =========================================================
      const boardWrap = document.getElementById('boardWrap');
      const tileLayer = document.getElementById('tileLayer');
      const scoreValue = document.getElementById('scoreValue');
      const bestValue = document.getElementById('bestValue');
      const restartBtn = document.getElementById('restartBtn');
      const winOverlay = document.getElementById('winOverlay');
      const gameOverOverlay = document.getElementById('gameOverOverlay');
      const continueBtn = document.getElementById('continueBtn');
      const winRestartBtn = document.getElementById('winRestartBtn');
      const loseRestartBtn = document.getElementById('loseRestartBtn');
      const leaderboardList = document.getElementById('leaderboardList');
      const leaderboardEmpty = document.getElementById('leaderboardEmpty');
      const nameInput = document.getElementById('nameInput');
      const submitBtn = document.getElementById('submitBtn');
      const submitStatus = document.getElementById('submitStatus');

      // =========================================================
      // Game state
      // =========================================================
      const SIZE = 4;
      const MOVE_MS = 155;
      const GAP = 10;

      let grid = makeEmptyGrid();
      let tiles = new Map();
      let tileEls = new Map();
      let nextId = 1;
      let score = 0;
      let best = Number(localStorage.getItem('dogged-2048-best') || 0);
      let hasWon = false;
      let inputLocked = false;
      let roundEnded = false;
      let submittedThisRound = false;

      bestValue.textContent = String(best);

      function makeEmptyGrid() {
        return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      }

      function setBoardMetrics() {
        const size = boardWrap.clientWidth;
        const tileSize = Math.floor((size - (GAP * (SIZE + 1))) / SIZE);
        boardWrap.style.setProperty('--gap', String(GAP));
        boardWrap.style.setProperty('--tile-size', String(tileSize));
      }

      function tilePx(row, col) {
        const tileSize = Number(getComputedStyle(boardWrap).getPropertyValue('--tile-size')) || 80;
        const x = GAP + col * (tileSize + GAP);
        const y = GAP + row * (tileSize + GAP);
        return { x, y };
      }

      function updateScoreUI() {
        scoreValue.textContent = String(score);
        bestValue.textContent = String(best);
      }

      function createTile(row, col, value, isNew = false) {
        const tile = { id: nextId++, row, col, value, isNew, isMerged: false, isRemoving: false };
        tiles.set(tile.id, tile);
        grid[row][col] = tile.id;
      }

      function randomEmptyCell() {
        const empty = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] === null) empty.push({ row: r, col: c });
          }
        }
        if (!empty.length) return null;
        return empty[Math.floor(Math.random() * empty.length)];
      }

      function spawnRandomTile(isNew = true) {
        const pos = randomEmptyCell();
        if (!pos) return false;
        createTile(pos.row, pos.col, Math.random() < 0.9 ? 2 : 4, isNew);
        return true;
      }

      function tileClass(value) {
        if (value <= 2048) return 't' + value;
        return 'super';
      }

      function renderTiles() {
        const active = new Set();

        tiles.forEach((tile) => {
          active.add(tile.id);
          let el = tileEls.get(tile.id);
          if (!el) {
            el = document.createElement('div');
            el.className = 'tile';
            tileEls.set(tile.id, el);
            tileLayer.appendChild(el);
          }

          el.textContent = String(tile.value);
          el.className = 'tile ' + tileClass(tile.value);
          if (tile.isNew) el.classList.add('new');
          if (tile.isMerged) el.classList.add('merged');
          if (tile.isRemoving) el.classList.add('removing');

          const p = tilePx(tile.row, tile.col);
          el.style.transform = `translate(${p.x}px, ${p.y}px)`;
        });

        [...tileEls.keys()].forEach((id) => {
          if (!active.has(id)) {
            const el = tileEls.get(id);
            if (el && el.parentNode) el.parentNode.removeChild(el);
            tileEls.delete(id);
          }
        });

        updateScoreUI();
      }

      function resetFlags() {
        tiles.forEach((t) => {
          t.isNew = false;
          t.isMerged = false;
          t.isRemoving = false;
        });
      }

      function clearBoard() {
        grid = makeEmptyGrid();
        tiles.clear();
        tileEls.clear();
        tileLayer.innerHTML = '';
      }

      function hideOverlays() {
        winOverlay.classList.remove('show');
        gameOverOverlay.classList.remove('show');
      }

      function resetGame() {
        clearBoard();
        score = 0;
        hasWon = false;
        inputLocked = false;
        roundEnded = false;
        submittedThisRound = false;
        hideOverlays();
        submitBtn.disabled = true;
        submitStatus.textContent = '';
        spawnRandomTile(true);
        spawnRandomTile(true);
        renderTiles();
      }

      function onRoundEnd() {
        if (roundEnded) return;
        roundEnded = true;
        submitBtn.disabled = score <= 0;
      }

      function getLines(direction) {
        const lines = [];
        if (direction === 'left') {
          for (let r = 0; r < SIZE; r++) lines.push([{ row: r, col: 0 }, { row: r, col: 1 }, { row: r, col: 2 }, { row: r, col: 3 }]);
        }
        if (direction === 'right') {
          for (let r = 0; r < SIZE; r++) lines.push([{ row: r, col: 3 }, { row: r, col: 2 }, { row: r, col: 1 }, { row: r, col: 0 }]);
        }
        if (direction === 'up') {
          for (let c = 0; c < SIZE; c++) lines.push([{ row: 0, col: c }, { row: 1, col: c }, { row: 2, col: c }, { row: 3, col: c }]);
        }
        if (direction === 'down') {
          for (let c = 0; c < SIZE; c++) lines.push([{ row: 3, col: c }, { row: 2, col: c }, { row: 1, col: c }, { row: 0, col: c }]);
        }
        return lines;
      }

      function performMove(direction) {
        if (inputLocked) return;

        const lines = getLines(direction);
        const actions = [];
        const actionById = new Map();
        const survivors = [];
        const mergedInto = new Set();
        const removeAfter = new Set();

        let moved = false;

        for (const line of lines) {
          const slots = [];
          for (const coord of line) {
            const id = grid[coord.row][coord.col];
            if (id === null) continue;
            const tile = tiles.get(id);
            const last = slots[slots.length - 1];

            if (last && !last.merged && tiles.get(last.id).value === tile.value) {
              const action = { id, to: { row: last.to.row, col: last.to.col }, mergeInto: last.id };
              actions.push(action);
              actionById.set(id, action);
              last.merged = true;
              mergedInto.add(last.id);
              removeAfter.add(id);
              continue;
            }

            const target = line[slots.length];
            const slot = { id, to: { row: target.row, col: target.col }, merged: false };
            slots.push(slot);
            const action = { id, to: { row: target.row, col: target.col }, mergeInto: null };
            actions.push(action);
            actionById.set(id, action);
          }

          survivors.push(...slots.map((s) => s.id));
        }

        for (const action of actions) {
          const t = tiles.get(action.id);
          if (!t) continue;
          if (t.row !== action.to.row || t.col !== action.to.col || action.mergeInto) {
            moved = true;
            break;
          }
        }

        if (!moved) return;
        inputLocked = true;

        resetFlags();

        const nextGrid = makeEmptyGrid();
        for (const id of survivors) {
          const a = actionById.get(id);
          const t = tiles.get(id);
          t.row = a.to.row;
          t.col = a.to.col;
          nextGrid[t.row][t.col] = id;
        }

        for (const action of actions) {
          if (!action.mergeInto) continue;
          const t = tiles.get(action.id);
          t.row = action.to.row;
          t.col = action.to.col;
          t.isRemoving = true;
        }

        mergedInto.forEach((id) => {
          const t = tiles.get(id);
          t.value *= 2;
          t.isMerged = true;
          score += t.value;
          if (t.value >= 2048) hasWon = true;
        });

        if (score > best) {
          best = score;
          localStorage.setItem('dogged-2048-best', String(best));
        }

        grid = nextGrid;
        renderTiles();

        setTimeout(() => {
          removeAfter.forEach((id) => tiles.delete(id));
          mergedInto.forEach((id) => {
            const t = tiles.get(id);
            if (t) t.isMerged = false;
          });

          spawnRandomTile(true);
          renderTiles();

          setTimeout(() => {
            tiles.forEach((t) => { t.isNew = false; });
            renderTiles();

            if (hasWon && !winOverlay.classList.contains('show')) {
              winOverlay.classList.add('show');
              onRoundEnd();
            } else if (!canMove()) {
              gameOverOverlay.classList.add('show');
              onRoundEnd();
            }

            inputLocked = false;
          }, 100);
        }, MOVE_MS);
      }

      function canMove() {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const id = grid[r][c];
            if (id === null) return true;
            const current = tiles.get(id);
            const right = c + 1 < SIZE ? tiles.get(grid[r][c + 1]) : null;
            const down = r + 1 < SIZE ? tiles.get(grid[r + 1][c]) : null;
            if (right && right.value === current.value) return true;
            if (down && down.value === current.value) return true;
          }
        }
        return false;
      }

      function keyToDirection(key) {
        switch (key) {
          case 'ArrowLeft':
          case 'a':
          case 'A': return 'left';
          case 'ArrowRight':
          case 'd':
          case 'D': return 'right';
          case 'ArrowUp':
          case 'w':
          case 'W': return 'up';
          case 'ArrowDown':
          case 's':
          case 'S': return 'down';
          default: return null;
        }
      }

      document.addEventListener('keydown', (e) => {
        const dir = keyToDirection(e.key);
        if (!dir) return;
        e.preventDefault();
        if (winOverlay.classList.contains('show') || gameOverOverlay.classList.contains('show')) return;
        performMove(dir);
      }, { passive: false });

      let touchStartX = 0;
      let touchStartY = 0;
      boardWrap.addEventListener('touchstart', (e) => {
        if (!e.touches || !e.touches.length) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      boardWrap.addEventListener('touchend', (e) => {
        if (!e.changedTouches || !e.changedTouches.length) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 28 && Math.abs(dy) < 28) return;
        if (winOverlay.classList.contains('show') || gameOverOverlay.classList.contains('show')) return;
        if (Math.abs(dx) > Math.abs(dy)) performMove(dx > 0 ? 'right' : 'left');
        else performMove(dy > 0 ? 'down' : 'up');
      }, { passive: true });

      async function loadLeaderboard() {
        leaderboardList.innerHTML = '';
        leaderboardEmpty.style.display = 'block';
        leaderboardEmpty.textContent = 'Loading leaderboard...';
        try {
          const res = await fetch(API_URL);
          if (!res.ok) throw new Error('Failed to fetch leaderboard');
          const data = await res.json();
          const entries = Array.isArray(data?.leaderboard) ? data.leaderboard.slice(0, 5) : [];

          leaderboardList.innerHTML = '';
          if (!entries.length) {
            leaderboardEmpty.style.display = 'block';
            leaderboardEmpty.textContent = 'No scores yet. Be the first.';
            return;
          }

          leaderboardEmpty.style.display = 'none';
          entries.forEach((entry, i) => {
            const li = document.createElement('li');
            li.className = 'lb-item';
            li.innerHTML =
              `<span class="lb-rank">${i + 1}</span>` +
              `<span class="lb-name">${escapeHtml(String(entry.name || 'PLAYER').slice(0, 12))}</span>` +
              `<span class="lb-score">${Number(entry.score || 0)}</span>`;
            leaderboardList.appendChild(li);
          });
        } catch {
          leaderboardEmpty.style.display = 'block';
          leaderboardEmpty.textContent = 'Leaderboard offline right now.';
        }
      }

      async function submitScore() {
        if (!roundEnded) {
          submitStatus.textContent = 'Finish the round first.';
          return;
        }
        if (submittedThisRound) {
          submitStatus.textContent = 'Score already submitted this round.';
          return;
        }

        const rawName = (nameInput.value || '').trim().toUpperCase();
        const name = rawName.replace(/[^A-Z0-9 _-]/g, '').slice(0, 12);
        if (!name) {
          submitStatus.textContent = 'Enter a valid name first.';
          return;
        }
        if (score <= 0) {
          submitStatus.textContent = 'Score must be above 0.';
          return;
        }

        submitBtn.disabled = true;
        submitStatus.textContent = 'Submitting...';

        const ts = Date.now();
        const payload = {
          name,
          score,
          ts,
          pid: devicePid,
          sig: makeSig(name, score, ts, devicePid),
        };

        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json().catch(() => ({}));

          if (!res.ok || data?.ok === false) {
            throw new Error(data?.error || 'Submit failed');
          }

          submittedThisRound = true;
          submitStatus.textContent = 'Score saved!';
          loadLeaderboard();
        } catch (err) {
          submitStatus.textContent = err.message || 'Failed to submit score.';
          submitBtn.disabled = false;
        }
      }

      restartBtn.addEventListener('click', resetGame);
      winRestartBtn.addEventListener('click', resetGame);
      loseRestartBtn.addEventListener('click', resetGame);
      continueBtn.addEventListener('click', () => winOverlay.classList.remove('show'));
      submitBtn.addEventListener('click', submitScore);

      window.addEventListener('resize', () => {
        setBoardMetrics();
        renderTiles();
      });

      setBoardMetrics();
      resetGame();
      loadLeaderboard();
    })();
  </script>
</body>
</html>

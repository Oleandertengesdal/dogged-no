<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogged Clicker — The Idle Game</title>
  <meta name="description" content="Click Sigve's face. Earn doggeds. Become the ultimate dogged machine.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="clicker.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>">
</head>
<body>
  <!-- Floating particles container -->
  <div id="particles"></div>

  <!-- Top bar -->
  <header class="top-bar">
    <a href="index.html" class="back-link">← Back to dogged.no</a>
    <div class="top-stats">
      <span class="dps-display">per second: <strong id="dpsDisplay">0</strong></span>
    </div>
  </header>

  <!-- Main Game Layout -->
  <div class="game-container">

    <!-- LEFT: Shop Panel -->
    <aside class="shop-panel" id="shopPanel">
      <h2>🏪 Dogged Shop</h2>

      <div class="shop-section">
        <h3>Buildings</h3>
        <div id="buildingsContainer"></div>
      </div>

      <div class="shop-section">
        <h3>Upgrades</h3>
        <div id="upgradesContainer"></div>
      </div>
    </aside>

    <!-- CENTER: Clicker Area -->
    <main class="clicker-area">
      <div class="dogged-counter-display">
        <div class="counter-value" id="doggedCount">0</div>
        <div class="counter-label">doggeds</div>
      </div>

      <div class="clicker-wrapper">
        <div class="click-ring" id="clickRing"></div>
        <button class="big-clicker" id="bigClicker">
          <img src="dogged-guy.jpg" alt="Sigve" class="clicker-face" draggable="false">
        </button>
        <div class="click-power-display">+<span id="clickPowerDisplay">1</span> per click</div>
      </div>

      <!-- Sigve quotes on click -->
      <div class="sigve-quote" id="sigveQuote"></div>
    </main>

    <!-- RIGHT: Stats & Achievements -->
    <aside class="stats-panel" id="statsPanel">
      <h2>📊 Stats</h2>
      <div class="stats-list">
        <div class="stat-row">
          <span>Total doggeds earned:</span>
          <strong id="statTotalEarned">0</strong>
        </div>
        <div class="stat-row">
          <span>Total clicks:</span>
          <strong id="statTotalClicks">0</strong>
        </div>
        <div class="stat-row">
          <span>Doggeds per click:</span>
          <strong id="statPerClick">1</strong>
        </div>
        <div class="stat-row">
          <span>Doggeds per second:</span>
          <strong id="statPerSecond">0</strong>
        </div>
        <div class="stat-row">
          <span>Buildings owned:</span>
          <strong id="statBuildings">0</strong>
        </div>
        <div class="stat-row">
          <span>Time played:</span>
          <strong id="statTimePlayed">0s</strong>
        </div>
      </div>

      <h2 style="margin-top: 1.5rem;">🏆 Achievements</h2>
      <div id="achievementsContainer" class="achievements-list"></div>

      <div class="save-controls">
        <button class="save-btn" id="saveBtn">💾 Save</button>
        <button class="save-btn reset-btn" id="resetBtn">🗑️ Reset</button>
      </div>
    </aside>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav">
    <button class="mobile-nav-btn active" data-panel="clicker">🐶 Click</button>
    <button class="mobile-nav-btn" data-panel="shop">🏪 Shop</button>
    <button class="mobile-nav-btn" data-panel="stats">📊 Stats</button>
  </nav>

  <script src="clicker.js"></script>
</body>
</html>
